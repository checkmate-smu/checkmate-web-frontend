name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # PR 열리면 자동 리뷰
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            이 PR의 코드 변경사항을 리뷰해줘.
            포맷, FSD 레이어 위반, 타입 에러, 디자인 토큰 하드코딩은 CI가 자동 검증하므로 무시해.
            비즈니스 로직 결함, 성능 문제, 보안 취약점, UX 개선에 집중해.
            한국어로 리뷰해.
            리뷰 결과를 반드시 PR 코멘트로 남겨. 문제가 없으면 "✅ 리뷰 완료 — 특이사항 없음"이라고 코멘트해.
          claude_args: "--max-turns 10"

  # @claude 멘션 시 대화형 응답
  interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 10"
